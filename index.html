<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alışveriş Listesi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Nunito',sans-serif;user-select:none;}
body{margin:0;min-height:100vh;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);padding:20px 16px 120px;}
input{user-select:text;}textarea{user-select:text;}
input::placeholder{color:rgba(255,255,255,0.3)}
input:focus{outline:none}textarea:focus{outline:none}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slide-in{animation:slideIn .25s ease forwards}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.swipe-wrapper{position:relative;border-radius:12px;margin-bottom:5px;overflow:hidden;}
.swipe-bg{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;padding:0 18px;font-weight:800;pointer-events:none;opacity:0;}
.swipe-bg-right{background:linear-gradient(90deg,#1a6b3a,#27ae60);justify-content:flex-start;color:#fff;gap:8px;font-size:13px;}
.swipe-bg-left{background:linear-gradient(90deg,#7b1a1a,#c0392b);justify-content:flex-end;color:#fff;gap:8px;font-size:13px;}
.swipe-item{position:relative;z-index:1;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.04);cursor:grab;display:flex;align-items:center;gap:10px;border:1px solid transparent;will-change:transform;touch-action:pan-y;}
.swipe-item:active{cursor:grabbing;}
#suggestions{position:absolute;left:0;right:0;top:calc(100% + 6px);background:rgba(20,15,50,0.97);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.12);border-radius:14px;overflow:hidden;z-index:100;animation:fadeUp .15s ease;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.sug-item{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s;border-bottom:1px solid rgba(255,255,255,0.05);}
.sug-item:last-child{border-bottom:none;}
.sug-item:hover,.sug-item.active{background:rgba(255,255,255,0.08);}
.sug-name{color:#fff;font-size:14px;font-weight:700;flex:1;}
.sug-match{color:#43e97b;font-weight:900;}
.sug-cat{font-size:11px;color:rgba(255,255,255,0.35);font-weight:700;}
.bought-chip{padding:6px 10px 6px 12px;border-radius:99px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:6px;transition:all .15s;}
.bought-chip:hover{background:rgba(255,255,255,0.08);}
.restore-btn{width:20px;height:20px;border-radius:99px;border:none;cursor:pointer;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;padding:0;line-height:1;}
.restore-btn:hover{background:rgba(67,233,123,0.25);color:#43e97b;}
</style>
</head>
<body>
<div id="app">
  <div style="text-align:center;margin-bottom:22px">
    <div style="font-size:42px">🛒</div>
    <h1 style="margin:4px 0 0;color:#fff;font-size:26px;font-weight:900">Alışveriş Listesi</h1>
    <div id="progress-bar" style="display:none;max-width:300px;margin:12px auto 0">
      <div style="display:flex;justify-content:space-between;color:rgba(255,255,255,0.45);font-size:12px;font-weight:700;margin-bottom:6px">
        <span id="bought-count">✓ 0 alındı</span><span id="pct-text">0%</span><span id="waiting-count">0 bekliyor</span>
      </div>
      <div style="background:rgba(255,255,255,0.1);border-radius:99px;height:6px">
        <div id="progress-fill" style="height:100%;width:0%;background:linear-gradient(90deg,#43e97b,#38f9d7);border-radius:99px;transition:width .5s"></div>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:10px;margin-bottom:10px;">
    <div style="flex:1;position:relative;">
      <input id="item-input" type="text" autocomplete="off" placeholder="Ürün ekle..."
        style="width:100%;padding:13px 16px;border-radius:16px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);color:#fff;font-size:15px;font-weight:600;transition:border-color .2s"
        onfocus="this.style.borderColor='rgba(255,255,255,0.4)'" onblur="this.style.borderColor='rgba(255,255,255,0.15)'"/>
      <div id="suggestions" style="display:none;"></div>
    </div>
    <button id="add-btn" onclick="addItem()"
      style="width:50px;height:50px;border-radius:16px;border:none;cursor:pointer;background:rgba(255,255,255,0.15);font-size:24px;font-weight:900;color:#1a1a2e;flex-shrink:0;transition:all .2s;line-height:1">+</button>
  </div>

  <div style="margin-bottom:20px;position:relative;z-index:40">
    <button onclick="toggleBulk()" id="bulk-toggle"
      style="width:100%;padding:10px 16px;border-radius:14px;border:1.5px dashed rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.4);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;"
      onmouseover="this.style.borderColor='rgba(255,255,255,0.35)';this.style.color='rgba(255,255,255,0.7)'"
      onmouseout="this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='rgba(255,255,255,0.4)'">
      <span>📋</span><span>Listeyi buraya yapıştır</span><span id="bulk-arrow">▾</span>
    </button>
    <div id="bulk-area" style="display:none;margin-top:8px;">
      <textarea id="bulk-input" rows="5"
        style="width:100%;padding:14px 16px;border-radius:16px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);color:#fff;font-size:14px;font-weight:600;resize:none;font-family:'Nunito',sans-serif;line-height:1.6;transition:border-color .2s;"
        onfocus="this.style.borderColor='rgba(255,255,255,0.4)'" onblur="this.style.borderColor='rgba(255,255,255,0.15)'"
        placeholder="Listeyi buraya yapıştır veya yaz..."></textarea>
      <button onclick="doBulkImport()" id="bulk-btn"
        style="margin-top:8px;width:100%;padding:13px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#a78bfa,#818cf8);color:#fff;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;">
        ✨ Listeyi Analiz Et ve Ekle
      </button>
    </div>
  </div>

  <div id="groups"></div>

  <div id="bought-section" style="display:none;margin-top:16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="flex:1;height:1px;background:rgba(255,255,255,0.08)"></div>
      <span style="color:rgba(255,255,255,0.3);font-size:11px;font-weight:800;letter-spacing:1px">✓ ALINANLAR</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,0.08)"></div>
    </div>
    <p style="color:rgba(255,255,255,0.2);font-size:11px;font-weight:700;margin:0 0 10px;text-align:center">↩ butonuna bas → geri listeye ekle</p>
    <div id="bought-list" style="display:flex;flex-wrap:wrap;gap:8px"></div>
  </div>

  <div id="empty-state" style="text-align:center;padding:60px 20px">
    <div style="font-size:64px;opacity:.2">🧺</div>
    <p style="color:rgba(255,255,255,0.25);font-size:15px;font-weight:700;margin-top:12px">Liste boş!<br>Ürün ekleyerek başla.</p>
  </div>

  <div id="reset-btn-wrap" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:20">

    </button>
  </div>
</div>

function tr(s){
return s.toLowerCase()
.replace(/ğ/g,“g”).replace(/ü/g,“u”).replace(/ş/g,“s”)
.replace(/ı/g,“i”).replace(/ö/g,“o”).replace(/ç/g,“c”)
.replace(/î/g,“i”).replace(/â/g,“a”).replace(/û/g,“u”).trim();
}
function lev(a,b){
const m=a.length,n=b.length;
if(Math.abs(m-n)>3)return 99;
const R=Array.from({length:m+1},(*,i)=>Array.from({length:n+1},(*,j)=>i===0?j:j===0?i:0));
for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
R[i][j]=a[i-1]===b[j-1]?R[i-1][j-1]:1+Math.min(R[i-1][j],R[i][j-1],R[i-1][j-1]);
return R[m][n];
}
function hexToRgb(hex){
const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);

function categorize(raw){
const input=tr(raw);
const words=input.split(/\s+/).filter(w=>w.length>=2);
for(const [cat,list] of Object.entries(KW)) for(const kw of list) if(tr(kw)===input) return cat;
for(const [cat,list] of Object.entries(KW)) for(const kw of list){const k=tr(kw);if(input.includes(k)||k.includes(input)) return cat;}
for(const [cat,list] of Object.entries(KW)) for(const kw of list){const k=tr(kw);for(const w of words) if(w.length>=3&&(k.includes(w)||w.includes(k))) return cat;}
let bestCat=“Diğer”,bestDist=99;
for(const [cat,list] of Object.entries(KW)) for(const kw of list){
const k=tr(kw);const maxD=k.length<=5?1:k.length<=9?2:3;
let d=lev(input,k);for(const w of words) if(w.length>=4) d=Math.min(d,lev(w,k));
if(d<=maxD&&d<bestDist){bestDist=d;bestCat=cat;}
}
return bestCat;
}

// Autocomplete
function getSuggestions(val){
if(!val||val.length<2)return[];
const q=tr(val);
const exact=[],startsWith=[],contains=[],fuzzy=[];
const inList=new Set(Object.values(groups).flat().map(i=>tr(i.name)));
for(const item of ITEMS_INDEX){
if(inList.has(item.norm)) continue;
const n=item.norm;
if(n===q){exact.push(item);continue;}
if(n.startsWith(q)){startsWith.push(item);continue;}
if(n.includes(q)){contains.push(item);continue;}
const words=q.split(/\s+/);
if(words.some(w=>w.length>=2&&n.includes(w))){contains.push(item);continue;}
if(q.length>=3&&lev(q,n.slice(0,q.length+1))<=1){fuzzy.push(item);}
}
return […exact,…startsWith,…contains,…fuzzy].slice(0,6);
}

// Swipe
function attachSwipe(wrapper,itemEl,itemId){
let sx=0,sy=0,cx=0,dragging=false,decided=false;
const THRESHOLD=75;
const bgR=wrapper.querySelector(”.swipe-bg-right”),bgL=wrapper.querySelector(”.swipe-bg-left”);
function start(x,y){sx=x;sy=y;cx=0;dragging=true;decided=false;itemEl.style.transition=“none”;}
function move(x,y){
if(!dragging)return;const dx=x-sx,dy=y-sy;
if(!decided&&Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>10){dragging=false;return;}
if(Math.abs(dx)>8)decided=true;if(!decided)return;cx=dx;
itemEl.style.transform=“translateX(”+dx+“px)”;
const ratio=Math.min(Math.abs(dx)/THRESHOLD,1);
if(dx>0){bgR.style.opacity=ratio;bgL.style.opacity=0;itemEl.style.background=“rgba(39,174,96,”+(ratio*0.2)+”)”;}
else{bgL.style.opacity=ratio;bgR.style.opacity=0;itemEl.style.background=“rgba(192,57,43,”+(ratio*0.2)+”)”;}
}
function end(){
if(!dragging)return;dragging=false;bgR.style.opacity=0;bgL.style.opacity=0;
itemEl.style.transition=“transform .28s ease, opacity .28s”;
if(cx>THRESHOLD){itemEl.style.transform=“translateX(115%)”;itemEl.style.opacity=“0”;setTimeout(()=>moveItem(itemId),280);}
else if(cx<-THRESHOLD){itemEl.style.transform=“translateX(-115%)”;itemEl.style.opacity=“0”;setTimeout(()=>deleteItem(itemId),280);}
else{itemEl.style.transform=“translateX(0)”;itemEl.style.background=“rgba(255,255,255,0.04)”;}
}
itemEl.addEventListener(“touchstart”,e=>{const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
itemEl.addEventListener(“touchmove”,e=>{const t=e.touches[0];move(t.clientX,t.clientY);if(decided)e.preventDefault();},{passive:false});
itemEl.addEventListener(“touchend”,end);itemEl.addEventListener(“touchcancel”,end);
itemEl.addEventListener(“mousedown”,e=>start(e.clientX,e.clientY));
document.addEventListener(“mousemove”,e=>{if(dragging)move(e.clientX,e.clientY);});
document.addEventListener(“mouseup”,()=>{if(dragging)end();});
}

header.innerHTML=”<span style='font-size:18px'>”+s.icon+”</span><span style='color:"+s.border+";font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase'>”+cat+”</span><span style='margin-left:auto;background:"+s.border+";color:#fff;border-radius:99px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;padding:0 6px'>”+items.length+”</span>”;
groupDiv.appendChild(header);
const itemsWrap=document.createElement(“div”);
itemsWrap.style.padding=“8px”;
for(const item of items){
const wrapper=document.createElement(“div”);
wrapper.className=“swipe-wrapper slide-in”;
wrapper.innerHTML=”<div class='swipe-bg swipe-bg-right'><span style='font-size:16px'>✅</span><span>Alındı</span></div><div class='swipe-bg swipe-bg-left'><span>Sil</span><span style='font-size:16px'>🗑️</span></div>”;
const itemEl=document.createElement(“div”);
itemEl.className=“swipe-item”;
itemEl.innerHTML=”<div style='width:20px;height:20px;border-radius:6px;border:2px solid "+s.border+"80;flex-shrink:0;'></div><span style='color:rgba(255,255,255,0.85);font-size:14px;font-weight:700;flex:1'>”+item.name+”</span><span style='color:rgba(255,255,255,0.18);font-size:13px'>⇄</span>”;
wrapper.appendChild(itemEl);
attachSwipe(wrapper,itemEl,item.id);
itemsWrap.appendChild(wrapper);
}
groupDiv.appendChild(itemsWrap);
groupsEl.appendChild(groupDiv);
}

if(bought.length>0){
boughtSection.style.display=“block”;
boughtList.innerHTML=””;
for(const item of bought){
const s=CAT_STYLE[item.category]||CAT_STYLE[“Diğer”];
const chip=document.createElement(“div”);
chip.className=“bought-chip slide-in”;
chip.innerHTML=”<span style='font-size:12px'>”+s.icon+”</span><span style='color:rgba(255,255,255,0.3);font-size:13px;font-weight:600;text-decoration:line-through'>”+item.name+”</span><button class='restore-btn' onclick='restoreItem("+item.id+")' title='Geri listeye ekle'>↩</button>”;
boughtList.appendChild(chip);
}
}else boughtSection.style.display=“none”;
}

render();

</script>
</body>
</html>
